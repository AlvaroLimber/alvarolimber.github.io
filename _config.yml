# Site settings
title: Mirada Estadística
email: achirino@aru.org.bo
url: https://example.github.io
description: "Buscando generar cultura estadística, una mirada hacia la calidad del dato y el uso responsable de información para la generación de políticas públicas."

# Contact form: comment the line below if you want to stick with the default PHP contact form
contact: static

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 18bc9c #80B3FF
  secondary: 2c3e50 #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Alvaro Chirino
  location: La Paz - Bolivia
  social: Otras redes
  credits: ARU

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: EstBolivia
    url: http://twitter.com/EstBolivia
  - title: facebook
    url:
  - title: stack-overflow
    url: http://stackoverflow.com/questions/tagged/jekyll
  - title: bitbucket
    url: http://bitbucket.org/jekyll
  - title: github
    url: http://github.com/alvarolimber

# Postal address (add as many lines as necessary)
address:
  - line: La Paz - Bolivia
  - line: 2588 Calle Pinilla, Edificio Arcadia Oficina 111

# Credits content
credits: 'Freelancer is a free to use, open source Bootstrap theme created by <a href="http://startbootstrap.com">Start Bootstrap</a>.'

# Build settings
markdown: kramdown
permalink: pretty
